controlgroup wheel

noipv6rs
noipv6
noarp
duid

persistent

# Настройка статического IP для unbound-if
# interface unbound-if
# static ip_address=169.254.0.1/16
# static routers=0.0.0.0
# static domain_name_servers=169.254.0.1

# Ignore Docker and k3d virtual interfaces
denyinterfaces veth* docker* br-* unbound-if

vendorclassid

option domain_name_servers, domain_name, domain_search
option classless_static_routes
option interface_mtu

option host_name

option rapid_commit

require dhcp_server_identifier

slaac private
nohook resolv.conf
