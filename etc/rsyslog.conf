$ModLoad immark   # provides --MARK-- message capability
$ModLoad imuxsock # provides support for local system logging (e.g. via logger command)
$ModLoad imklog   # kernel logging (formerly provided by rklogd)

#Old format time
$ActionFileDefaultTemplate RSYSLOG_TraditionalFileFormat

$IncludeConfig /etc/rsyslog.d/
$FileCreateMode 0640
$DirCreateMode 0750
$FileOwner root
$FileGroup logread

# Kubernetes
:msg, contains, "cni0: port" stop
:msg, contains, "entered blocking state" stop
:msg, contains, "entered forwarding state" stop  
:msg, contains, "entered disabled state" stop
:msg, contains, "entered allmulticast mode" stop
:msg, contains, "entered promiscuous mode" stop
:msg, contains, "left allmulticast mode" stop
:msg, contains, "left promiscuous mode" stop

# Docker 
:msg, contains, "cleaning up after shim disconnected" stop

# iptables/nftables
:msg, contains, "INPUT DROP:" -/var/log/firewall.log
:msg, contains, "INPUT DROP:" stop
:msg, contains, "FORWARD DROP:" -/var/log/firewall.log  
:msg, contains, "FORWARD DROP:" stop

if ($syslogfacility-text == 'kern' and (
        $msg contains 'renamed from veth' or
        $msg contains 'renamed from eth0'
    )) then {
    stop
}


if $programname == 'unbound' then {
    action(type="omfile"
           file="/var/log/unbound.log"
           fileOwner="_unbound"
           fileGroup="_unbound"
           fileCreateMode="0640")
    stop
}

# Log all kernel messages to the console.
# Logging much else clutters up the screen.
#kern.*                                                 /dev/console

# Log anything (except mail) of level info or higher.
# Don't log private authentication messages!
*.info;mail.none;authpriv.none;cron.none;local1.none    -/var/log/messages

local1.*                                                /var/log/xorg-session.log

# The authpriv file has restricted access.
authpriv.*                                              /var/log/secure

# Log all the mail messages in one place.
mail.*                                                  -/var/log/maillog

# Log cron stuff
cron.*                                                  -/var/log/cron

# Everybody gets emergency messages
*.emerg                                                 .*

# Save news errors of level crit and higher in a special file.
#uucp,news.crit                                          -/var/log/spooler

# Save boot messages also to boot.log
#local7.*                                                /var/log/boot.log
